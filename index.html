<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文時態練習系統</title>
    <style>
        /* 整體風格設定 */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f0f4f8;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: var(--primary-color); margin-bottom: 25px; }
        h2 { color: #555; font-size: 1.2rem; }

        /* 按鈕樣式 */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
        }

        .btn:hover {
            border-color: var(--primary-color);
            background-color: #fdfdfd;
            transform: translateY(-2px);
        }

        .btn-main {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: bold;
        }

        .btn-main:hover {
            background-color: #357abd;
        }

        /* 答題回饋 */
        .correct { background-color: var(--success-color) !important; color: white !important; border-color: var(--success-color) !important; }
        .wrong { background-color: var(--danger-color) !important; color: white !important; border-color: var(--danger-color) !important; }

        /* 隱藏區塊 */
        .hidden { display: none; }

        /* 進度條 */
        .progress-text { font-size: 14px; color: #888; margin-bottom: 10px; }
        
        #feedback {
            margin: 15px 0;
            font-weight: bold;
            font-size: 1.2rem;
            min-height: 1.5em;
        }

        .score-display { font-size: 3rem; font-weight: bold; color: var(--success-color); }
    </style>
</head>
<body>

<div class="container">
    <div id="lobby-screen">
        <h1>🌟 英文練習大廳</h1>
        <p>請選擇你想要挑戰的單元：</p>
        <button class="btn" onclick="loadQuiz('past_tense_practice.json', '過去式練習')">📘 過去式練習 (Past Tense)</button>
        <button class="btn" onclick="loadQuiz('past_participle_practice.json', '過去分詞練習')">📙 過去分詞練習 (Past Participle)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="quiz-title">單元載入中...</h2>
        <div class="progress-text">題目：<span id="current-idx">1</span> / <span id="total-idx">0</span></div>
        <div id="question" style="font-size: 24px; font-weight: bold; margin: 20px 0; color: #2c3e50;"></div>
        
        <div id="options-container">
            </div>

        <div id="feedback"></div>
        
        <button id="next-btn" class="btn btn-main hidden" onclick="nextQuestion()">下一題</button>
        <button class="btn" style="font-size: 14px; margin-top: 20px; color: #888; border: none;" onclick="location.reload()">放棄並回主選單</button>
    </div>

    <div id="result-screen" class="hidden">
        <h1>🎊 挑戰完成！</h1>
        <p>你的得分是：</p>
        <div class="score-display"><span id="final-score">0</span> / <span id="final-total">0</span></div>
        <p id="grade-msg"></p>
        <button class="btn btn-main" onclick="location.reload()">再試一次</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let currentIndex = 0;
    let userScore = 0;
    let isAnswered = false;

    // 從本地讀取選定的 JSON 檔案
    async function loadQuiz(fileName, title) {
        try {
            const response = await fetch(`./${fileName}`);
            if (!response.ok) throw new Error('找不到檔案');
            
            allQuestions = await response.json();
            
            // 隨機打亂題目順序
            allQuestions.sort(() => Math.random() - 0.5);

            // 切換畫面
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('quiz-title').innerText = title;
            document.getElementById('total-idx').innerText = allQuestions.length;

            startQuiz();
        } catch (error) {
            alert(`載入失敗！請確認 GitHub 中是否有 ${fileName} 檔案。`);
            console.error(error);
        }
    }

    function startQuiz() {
        currentIndex = 0;
        userScore = 0;
        showQuestion();
    }

    function showQuestion() {
        isAnswered = false;
        const q = allQuestions[currentIndex];
        
        // 更新進度
        document.getElementById('current-idx').innerText = currentIndex + 1;
        document.getElementById('question').innerText = q.題目;
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').classList.add('hidden');

        // 整理選項：正確答案 + 陷阱
        // 這裡會自動過濾掉 JSON 中沒有填寫的陷阱欄位
        let rawOptions = [q.答案, q.陷阱1, q.陷阱2, q.陷阱3].filter(o => o && o.trim() !== "");
        
        // 隨機打亂選項順序
        rawOptions.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        rawOptions.forEach(optText => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = optText;
            btn.onclick = () => checkAnswer(btn, optText, q.答案);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedText, correctText) {
        if (isAnswered) return;
        isAnswered = true;

        const allBtns = document.querySelectorAll('#options-container .btn');
        const feedback = document.getElementById('feedback');

        if (selectedText === correctText) {
            selectedBtn.classList.add('correct');
            feedback.innerText = "✨ 太棒了！答對了";
            feedback.style.color = "var(--success-color)";
            userScore++;
        } else {
            selectedBtn.classList.add('wrong');
            feedback.innerText = `💡 差一點點！答案是：${correctText}`;
            feedback.style.color = "var(--danger-color)";
            
            // 將正確的那顆按鈕也標示出來
            allBtns.forEach(btn => {
                if (btn.innerText === correctText) btn.classList.add('correct');
            });
        }

        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < allQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        document.getElementById('final-score').innerText = userScore;
        document.getElementById('final-total').innerText = allQuestions.length;

        const ratio = userScore / allQuestions.length;
        let msg = "";
        if (ratio === 1) msg = "完美！你是時態大師！🏆";
        else if (ratio >= 0.8) msg = "表現優異！再接再厲！🌟";
        else if (ratio >= 0.6) msg = "還不錯，再多練習幾次會更好！👍";
        else msg = "別灰心，再練習一次看看吧！💪";
        
        document.getElementById('grade-msg').innerText = msg;
    }
</script>

</body>
</html>
