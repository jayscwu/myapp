<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全科精熟學習系統 v4.0 - 自動偵測版</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --bg: #f8f9fa; --mastery: #f1c40f; --review: #9b59b6; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .version-tag { font-size: 12px; color: #ccc; text-align: right; margin-bottom: 10px; font-weight: bold; }
        
        /* UI 元素 */
        h1 { color: var(--primary); margin-top: 0; margin-bottom: 25px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; cursor: pointer; font-size: 18px; transition: 0.3s; background: white; outline: none; }
        .btn:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; transform: translateY(-2px); }
        .btn-start { background: var(--primary); color: white; border: none; font-weight: bold; margin-top: 20px; }
        .btn-retry { background: var(--review); color: white; border: none; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .hidden { display: none; }
        .input-group { margin: 15px 0; text-align: left; }
        label { font-weight: bold; color: #555; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        /* 答題回饋與表格 */
        .review-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        .review-table th, .review-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .review-table th { background: #f8f9fa; }
        .status-correct { color: var(--success); font-weight: bold; }
        .status-wrong { color: var(--danger); font-weight: bold; }
        .highlight-correct { background-color: #d4edda; color: #155724; font-weight: bold; padding: 3px 6px; border-radius: 4px; border: 1px solid #c3e6cb; }
        
        #loading-overlay { color: var(--primary); font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="version-tag">Version 4.0 - Auto Discovery System</div>
    
    <div id="setup-screen">
        <h1>🌟 全科精熟學習系統</h1>
        
        <div id="loading-overlay">正在從 GitHub 載入題庫清單...</div>
        
        <div id="setup-form" class="hidden">
            <div class="input-group">
                <label>👤 學生姓名：</label>
                <input type="text" id="student-name" placeholder="輸入姓名">
            </div>

            <div class="input-group">
                <label>📚 選擇科目：</label>
                <select id="subject-select" onchange="fetchUnits()"></select>
            </div>

            <div class="input-group">
                <label>📖 選擇單元：</label>
                <select id="unit-select" onchange="updateMaxHint()"></select>
            </div>

            <div class="input-group">
                <label>🎯 測驗題數：</label>
                <input type="number" id="count-input" min="1">
                <div id="max-hint" style="font-size:12px; color:#888; margin-top:5px;"></div>
                <div id="error-area" style="color:var(--danger); font-size:14px; font-weight:bold; margin-top:5px;"></div>
            </div>

            <button id="start-btn" class="btn btn-start" onclick="initQuiz()">開始學習挑戰</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="current-title" style="color:var(--primary);"></h2>
        <div id="mode-tag" style="background: #e9ecef; padding: 4px 15px; border-radius: 20px; font-size: 13px; display: inline-block; margin-bottom: 15px;">正式測驗</div>
        <div style="font-size: 14px; color: #888;">進度：<span id="progress-text"></span></div>
        <div id="question" style="font-size: 26px; font-weight: bold; margin: 30px 0;"></div>
        <div id="options"></div>
        <div id="feedback" style="margin: 20px 0; font-weight: bold; min-height: 1.5em; font-size: 1.3rem;"></div>
        <button id="next-btn" class="btn btn-start hidden" onclick="goNext()">下一題</button>
    </div>

    <div id="result-screen" class="hidden">
        <div id="normal-result">
            <h1>🏁 練習報告</h1>
            <div style="font-size: 36px; font-weight: bold; color: var(--primary); margin: 15px 0;">
                得分：<span id="score-val">0</span> / <span id="total-val">0</span>
            </div>
            <p id="record-status" style="color: #666; font-size: 14px;"></p>
            <button id="retry-wrong-btn" class="btn btn-retry hidden" onclick="startRemediation()">🔥 繼續消滅剩下的錯題</button>

            <h3 style="text-align: left; margin-top: 35px; border-left: 5px solid var(--primary); padding-left: 12px;">📊 本輪作答詳情</h3>
            <div style="overflow-x: auto;">
                <table class="review-table">
                    <thead>
                        <tr><th>題目</th><th>你的答案</th><th>正確答案</th><th>結果</th></tr>
                    </thead>
                    <tbody id="review-list"></tbody>
                </table>
            </div>
        </div>

        <div id="mastery-result" class="hidden">
            <div style="font-size:80px;">🏆</div>
            <h2 style="color:var(--mastery);">恭喜完成「精熟學習」！</h2>
            <p>你已經消滅了所有錯題，真的太棒了！</p>
        </div>
        
        <button class="btn btn-start" style="margin-top: 30px;" onclick="location.reload()">回首頁</button>
    </div>
</div>

<script>
    // --- 老師請設定這兩項 ---
    const GITHUB_USER = "jayscwu";
    const GITHUB_REPO = "myapp";
    // ----------------------

    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfm4hKuyg6BZBMwYmi-rbg7i2o3OKkCyRKXmEMCW-sf2J6JcA/formResponse";
    const ENTRY_IDS = { name: "entry.1455585119", unit: "entry.520138431", score: "entry.1711683843", total: "entry.865473161" };

    let currentPool = [];
    let quizData = [];
    let currentIndex = 0;
    let score = 0;
    let roundResponses = [];
    let wrongPool = [];
    let isRemediation = false;

    // 1. 自動讀取 data/ 下的資料夾 (科目)
    async function fetchSubjects() {
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data`);
            const items = await res.json();
            const folders = items.filter(i => i.type === 'dir');
            
            const select = document.getElementById('subject-select');
            folders.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.path;
                opt.innerText = f.name;
                select.appendChild(opt);
            });
            
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('setup-form').classList.remove('hidden');
            fetchUnits();
        } catch (e) {
            document.getElementById('loading-overlay').innerText = "❌ 無法讀取題庫，請檢查 data 資料夾是否存在。";
        }
    }

    // 2. 自動讀取科目下的 JSON (單元)
    async function fetchUnits() {
        const path = document.getElementById('subject-select').value;
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`);
        const files = await res.json();
        const jsons = files.filter(f => f.name.endsWith('.json'));
        
        const select = document.getElementById('unit-select');
        select.innerHTML = "";
        jsons.forEach(f => {
            const opt = document.createElement('option');
            opt.value = f.download_url;
            opt.innerText = f.name.replace('.json', '').replace(/_/g, ' ');
            select.appendChild(opt);
        });
        updateMaxHint();
    }

    // 3. 取得單元最大題數
    async function updateMaxHint() {
        const url = document.getElementById('unit-select').value;
        const res = await fetch(url);
        currentPool = await res.json();
        document.getElementById('max-hint').innerText = `💡 此單元有 ${currentPool.length} 題，請輸入 1 ~ ${currentPool.length}`;
        document.getElementById('count-input').value = Math.min(10, currentPool.length);
    }

    function initQuiz() {
        const name = document.getElementById('student-name').value.trim();
        const count = parseInt(document.getElementById('count-input').value);
        if(!name) { alert("請輸入姓名"); return; }
        if(isNaN(count) || count < 1 || count > currentPool.length) { alert("題數設定錯誤"); return; }

        window.studentName = name;
        window.unitName = document.getElementById('unit-select').options[document.getElementById('unit-select').selectedIndex].text;
        
        let shuffled = [...currentPool].sort(() => Math.random() - 0.5);
        quizData = shuffled.slice(0, count);
        isRemediation = false;
        startRound();
    }

    function startRound() {
        currentIndex = 0; score = 0; roundResponses = [];
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        const tag = document.getElementById('mode-tag');
        tag.innerText = isRemediation ? "🔥 錯題消滅模式" : "正式測驗模式";
        tag.style.background = isRemediation ? "var(--review)" : "#e9ecef";
        tag.style.color = isRemediation ? "white" : "black";
        
        document.getElementById('current-title').innerText = window.unitName;
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentIndex];
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${quizData.length}`;
        document.getElementById('question').innerText = q.題目;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').classList.add('hidden');

        let opts = [q.答案, q.陷阱1, q.陷阱2, q.陷阱3].filter(o => o && o.trim() !== "").sort(() => Math.random() - 0.5);
        const container = document.getElementById('options');
        container.innerHTML = "";
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "btn";
            btn.innerText = opt;
            btn.onclick = () => check(btn, opt, q.答案);
            container.appendChild(btn);
        });
    }

    function check(btn, selected, correct) {
        if(!document.getElementById('next-btn').classList.contains('hidden')) return;
        const isCorrect = (selected === correct);
        if(isCorrect) {
            btn.style.background = "var(--success)"; btn.style.color = "white";
            document.getElementById('feedback').innerText = "✨ 正確！";
            score++;
        } else {
            btn.style.background = "var(--danger)"; btn.style.color = "white";
            document.getElementById('feedback').innerText = `❌ 錯誤！`;
            document.querySelectorAll('#options .btn').forEach(b => { if(b.innerText === correct) b.style.border = "3px solid var(--success)"; });
        }
        roundResponses.push({ raw: quizData[currentIndex], q: quizData[currentIndex].題目, user: selected, ans: correct, ok: isCorrect });
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function goNext() {
        currentIndex++;
        if(currentIndex < quizData.length) showQuestion();
        else finalize();
    }

    function finalize() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const listBody = document.getElementById('review-list');
        listBody.innerHTML = "";
        wrongPool = [];

        roundResponses.forEach(item => {
            if(!item.ok) wrongPool.push(item.raw);
            const row = document.createElement('tr');
            row.innerHTML = `<td>${item.q}</td><td class="${item.ok?'':'status-wrong'}">${item.user}</td><td>${item.ok?item.ans:`<span class="highlight-correct">${item.ans}</span>`}</td><td class="${item.ok?'status-correct':'status-wrong'}">${item.ok?'✅':'❌'}</td>`;
            listBody.appendChild(row);
        });

        if(wrongPool.length === 0) {
            document.getElementById('normal-result').classList.add('hidden');
            document.getElementById('mastery-result').classList.remove('hidden');
        } else {
            document.getElementById('normal-result').classList.remove('hidden');
            document.getElementById('mastery-result').classList.add('hidden');
            document.getElementById('score-val').innerText = score;
            document.getElementById('total-val').innerText = quizData.length;
            const btn = document.getElementById('retry-wrong-btn');
            btn.classList.remove('hidden');
            btn.innerText = `🔥 繼續消滅剩下的 ${wrongPool.length} 題錯題`;
        }

        if(!isRemediation) submit();
        else document.getElementById('record-status').innerText = "補救模式完成，不重複上傳。";
    }

    function startRemediation() {
        quizData = [...wrongPool];
        isRemediation = true;
        startRound();
    }

    function submit() {
        const formData = new FormData();
        formData.append(ENTRY_IDS.name, window.studentName);
        formData.append(ENTRY_IDS.unit, window.unitName);
        formData.append(ENTRY_IDS.score, score);
        formData.append(ENTRY_IDS.total, quizData.length);
        fetch(GOOGLE_FORM_URL, { method: "POST", mode: "no-cors", body: formData })
        .then(() => { document.getElementById('record-status').innerText = "✅ 成績已存入紀錄表"; });
    }

    window.onload = fetchSubjects;
</script>
</body>
</html>
