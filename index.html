<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然科隨機測驗 - 更新版</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .quiz-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .question-text { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #1a73e8; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .option-btn:hover { background-color: #e8f0fe; border-color: #1a73e8; }
        .correct { background-color: #4caf50 !important; color: white; border-color: #4caf50; }
        .wrong { background-color: #f44336 !important; color: white; border-color: #f44336; }
        .score-board { margin-top: 20px; font-weight: bold; color: #555; }
        #next-btn { margin-top: 20px; padding: 10px 25px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="quiz-area">
        <div id="progress" style="font-size: 12px; color: #888;">正在載入...</div>
        <div id="question" class="question-text">載入中，請稍候...</div>
        <div id="options"></div>
        <div id="feedback" style="margin-top: 15px; font-weight: bold;"></div>
        <button id="next-btn" onclick="nextQuestion()">下一題</button>
    </div>
    <div id="result-area" style="display:none;">
        <h2>測驗完成！</h2>
        <p class="score-board">最終得分：<span id="final-score">0</span> / <span id="total-q">0</span></p>
        <button onclick="location.reload()" style="padding: 10px 20px;">再測一次</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
    // ⚠️ 請務必在此貼上你的 CSV 連結
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhhiEiWxlYdOjHqbnmgV7ztbBUcZ6YaMu6N7cd0dOCSCeOimoUuD4XgFMe5m_oYsr6fL4Fowci5cGy/pub?output=csv'; 

    let questions = [];
    let currentIndex = 0;
    let score = 0;

    async function loadData() {
        const res = await fetch(CSV_URL);
        const csv = await res.text();
        Papa.parse(csv, {
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
                // 自動修復：把欄位名稱頭尾的空白去掉，防止 "題目 " 抓不到的問題
                questions = results.data.map(row => {
                    let newRow = {};
                    for (let key in row) { newRow[key.trim()] = row[key].trim(); }
                    return newRow;
                }).filter(q => q.題目); // 只要有題目的才算

                // 隨機打亂題目順序
                questions.sort(() => Math.random() - 0.5);
                startQuiz();
            }
        });
    }

    function startQuiz() {
        currentIndex = 0;
        score = 0;
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIndex];
        document.getElementById('progress').innerText = `題目：${currentIndex + 1} / ${questions.length}`;
        document.getElementById('question').innerText = q.題目;
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        
        // 組合正確答案與陷阱
        let opts = [q.答案, q.陷阱1, q.陷阱2, q.陷阱3].filter(o => o);
        // 隨機打亂選項順序
        opts.sort(() => Math.random() - 0.5);

        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        opts.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = text;
            btn.onclick = () => checkAnswer(btn, text, q.答案);
            optDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        if (document.getElementById('next-btn').style.display === 'block') return;

        const btns = document.querySelectorAll('.option-btn');
        if (selected === correct) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerText = '✅ 太棒了！答對了';
            document.getElementById('feedback').style.color = 'green';
            score++;
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerText = `❌ 答錯囉，答案是：${correct}`;
            document.getElementById('feedback').style.color = 'red';
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            showQuestion();
        } else {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            document.getElementById('total-q').innerText = questions.length;
        }
    }

    loadData();
</script>
</body>
</html>
