<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文練習系統 - 自動紀錄版</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; cursor: pointer; font-size: 18px; transition: 0.3s; background: white; }
        .btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .btn-start { background: var(--primary); color: white; border: none; font-weight: bold; margin-top: 20px; }
        .hidden { display: none; }
        .input-group { margin: 15px 0; text-align: left; }
        label { font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* 錯題表格 */
        .wrong-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; background: #fff; }
        .wrong-table th, .wrong-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .wrong-table th { background: #f8f9fa; color: #666; }
        .txt-red { color: var(--danger); font-weight: bold; }
        .txt-green { color: var(--success); font-weight: bold; }
        
        #feedback { margin: 15px 0; font-size: 1.2rem; min-height: 1.5em; }
        .progress-bar { font-size: 14px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>📝 英文測驗系統</h1>
        <div class="input-group">
            <label>學生姓名：</label>
            <input type="text" id="student-name" placeholder="請輸入姓名">
        </div>
        <div class="input-group">
            <label>選擇練習單元：</label>
            <select id="unit-select">
                <option value="past_tense_practice.json">過去式練習 (Past Tense)</option>
                <option value="past_participle_practice.json">過去分詞練習 (Past Participle)</option>
            </select>
        </div>
        <div class="input-group">
            <label>測驗題數：</label>
            <select id="count-select">
                <option value="5">5 題</option>
                <option value="10">10 題</option>
                <option value="20">20 題</option>
                <option value="999">全部題目</option>
            </select>
        </div>
        <button class="btn btn-start" onclick="initQuiz()">開始測驗</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="current-unit-display" style="color:var(--primary);"></h2>
        <div class="progress-bar">進度：<span id="progress-text"></span></div>
        <div id="question" style="font-size: 24px; font-weight: bold; margin: 30px 0;"></div>
        <div id="options"></div>
        <div id="feedback"></div>
        <button id="next-btn" class="btn btn-start hidden" onclick="goNext()">下一題</button>
    </div>

    <div id="result-screen" class="hidden">
        <h1>🏁 測驗結束</h1>
        <div style="font-size: 40px; font-weight: bold; color: var(--success); margin: 20px 0;">
            <span id="score-val">0</span> / <span id="total-val">0</span>
        </div>
        <p id="record-status" style="color: #4a90e2; font-weight: bold;">正在儲存成績到老師的紀錄表...</p>
        
        <div id="review-area">
            <h3 style="text-align: left; margin-top: 30px;">❌ 錯題檢討</h3>
            <table class="wrong-table">
                <thead>
                    <tr><th>題目</th><th>你的答案</th><th>正確答案</th></tr>
                </thead>
                <tbody id="wrong-list"></tbody>
            </table>
        </div>
        
        <button class="btn btn-start" style="margin-top: 30px;" onclick="location.reload()">回主選單</button>
    </div>
</div>

<script>
    // --- 根據您的連結自動填入的設定 ---
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfm4hKuyg6BZBMwYmi-rbg7i2o3OKkCyRKXmEMCW-sf2J6JcA/formResponse";
    const ENTRY_IDS = {
        name: "entry.1455585119",
        unit: "entry.520138431",
        score: "entry.1711683843",
        total: "entry.865473161"
    };
    // --------------------------------

    let quizData = [];
    let currentIndex = 0;
    let score = 0;
    let wrongAnswers = []; 
    let studentName = "";
    let selectedUnitName = "";

    async function initQuiz() {
        studentName = document.getElementById('student-name').value.trim();
        if(!studentName) { alert("請先輸入姓名喔！"); return; }

        const file = document.getElementById('unit-select').value;
        const count = parseInt(document.getElementById('count-select').value);
        selectedUnitName = document.getElementById('unit-select').options[document.getElementById('unit-select').selectedIndex].text;

        try {
            const res = await fetch(`./${file}`);
            let data = await res.json();
            
            // 隨機打亂並選取題數
            data.sort(() => Math.random() - 0.5);
            quizData = data.slice(0, Math.min(count, data.length));

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('current-unit-display').innerText = selectedUnitName;
            showQuestion();
        } catch (e) {
            alert("讀取題庫失敗，請確認檔案是否存在於 GitHub 中。");
        }
    }

    function showQuestion() {
        const q = quizData[currentIndex];
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${quizData.length}`;
        document.getElementById('question').innerText = q.題目;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').classList.add('hidden');

        // 整理選項並隨機化
        let opts = [q.答案, q.陷阱1, q.陷阱2, q.陷阱3].filter(o => o && o.trim() !== "").sort(() => Math.random() - 0.5);
        
        const container = document.getElementById('options');
        container.innerHTML = "";
        
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "btn";
            btn.innerText = opt;
            btn.onclick = () => check(btn, opt, q.答案);
            container.appendChild(btn);
        });
    }

    function check(btn, selected, correct) {
        // 防止重複點選
        if(!document.getElementById('next-btn').classList.contains('hidden')) return;
        
        const allBtns = document.querySelectorAll('#options .btn');
        if(selected === correct) {
            btn.style.background = "var(--success)";
            btn.style.color = "white";
            btn.style.borderColor = "var(--success)";
            document.getElementById('feedback').innerText = "✨ 非常正確！";
            document.getElementById('feedback').style.color = "var(--success)";
            score++;
        } else {
            btn.style.background = "var(--danger)";
            btn.style.color = "white";
            btn.style.borderColor = "var(--danger)";
            document.getElementById('feedback').innerText = `💡 答案是：${correct}`;
            document.getElementById('feedback').style.color = "var(--danger)";
            
            // 標示出正確答案
            allBtns.forEach(b => {
                if(b.innerText === correct) b.style.border = "2px solid var(--success)";
            });

            // 紀錄到錯題清單
            wrongAnswers.push({ title: quizData[currentIndex].題目, mine: selected, correct: correct });
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function goNext() {
        currentIndex++;
        if(currentIndex < quizData.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-val').innerText = score;
        document.getElementById('total-val').innerText = quizData.length;
        
        // 渲染錯題清單
        const listBody = document.getElementById('wrong-list');
        if(wrongAnswers.length === 0) {
            document.getElementById('review-area').innerHTML = "<h3 style='color:var(--success)'>🏆 太厲害了！全部答對！</h3>";
        } else {
            wrongAnswers.forEach(item => {
                listBody.innerHTML += `<tr>
                    <td>${item.title}</td>
                    <td class="txt-red">${item.mine}</td>
                    <td class="txt-green">${item.correct}</td>
                </tr>`;
            });
        }

        // 執行自動回傳
        submitToGoogleForm();
    }

    function submitToGoogleForm() {
        const formData = new FormData();
        formData.append(ENTRY_IDS.name, studentName);
        formData.append(ENTRY_IDS.unit, selectedUnitName);
        formData.append(ENTRY_IDS.score, score);
        formData.append(ENTRY_IDS.total, quizData.length);

        fetch(GOOGLE_FORM_URL, {
            method: "POST",
            mode: "no-cors",
            body: formData
        }).then(() => {
            document.getElementById('record-status').innerText = "✅ 成績已成功儲存到老師的紀錄表！";
            document.getElementById('record-status').style.color = "var(--success)";
        }).catch(() => {
            document.getElementById('record-status').innerText = "⚠️ 紀錄失敗，請拍下此畫面給老師。";
            document.getElementById('record-status').style.color = "var(--danger)";
        });
    }
</script>

</body>
</html>
